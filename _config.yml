title: AI SEO Mastery
description: Real strategies for scaling your SEO agency and affiliate business with AI
author: SEO Pro
baseurl: ""
url: ""

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
paginate: 20
paginate_path: "/page:num/"

# Permalink structure (good for SEO)
permalink: /:title/

# Exclude from build
exclude:
  - generate_posts.py
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
